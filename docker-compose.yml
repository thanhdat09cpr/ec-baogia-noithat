services:
  # DB Postgres — dữ liệu bền qua volume pgdata.
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baogia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?can POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-baogia}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baogia} -d ${POSTGRES_DB:-baogia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # O2: migrate one-shot — chạy alembic upgrade head TRƯỚC app, xong thì thoát.
  migrate:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    command: ["python", "-m", "alembic", "-c", "webapp/alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # App gunicorn (1 worker gthread + ThreadPoolExecutor cho job nền).
  # HTTPS: đi qua Traefik CÓ SẴN trên VPS (labels giống n8n) — KHÔNG chạy reverse proxy riêng,
  # KHÔNG chiếm cổng 80/443. Traefik (host network) route tới container IP:8000 nội bộ.
  # DOMAIN đặt trong .env; cert tự động qua certresolver 'letsencrypt' của Traefik.
  app:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TAKEOFF_MODEL: ${TAKEOFF_MODEL:-claude-opus-4-8}
      SECRET_KEY: ${SECRET_KEY:?can SECRET_KEY >=32 bytes}
      USD_VND_RATE: ${USD_VND_RATE:-25000}
    volumes:
      - ./projects:/app/projects   # O6: file dự án bền qua volume
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.baogia.entrypoints=websecure"
      - "traefik.http.routers.baogia.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.baogia.tls.certresolver=letsencrypt"
      - "traefik.http.services.baogia.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
